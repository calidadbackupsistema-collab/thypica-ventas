<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Thypica — Entregas & Cortes</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf7f2;--pearl:#f5f0e8;--beige:#ede4d4;--tan:#d4c4a8;
  --brown:#8b6340;--brown-lt:#b89a78;
  --violet:#6b21a8;--vm:#7c3aed;--vl:#ede9fe;--vt:#4c1d95;
  --plum:#a21caf;--pl:#f5d0fe;--pt:#701a75;
  --green:#065f46;--gl:#d1fae5;
  --orange:#92400e;--ol:#fef3c7;
  --red:#991b1b;--rl:#fee2e2;
  --text:#2c1a0e;--t2:#7a5c3a;--t3:#b89a78;
  --bdr:rgba(139,99,64,0.15);--bdr2:rgba(139,99,64,0.28);
  --r:10px;--rlg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--violet),var(--vm) 50%,var(--plum));
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(107,33,168,.3)}
.brand h1{font-size:17px;font-weight:700;color:#fff}
.brand p{font-size:10px;color:rgba(255,255,255,.7)}
.hdr-r{display:flex;align-items:center;gap:8px}
.dash-link{font-size:11px;font-weight:600;color:#fff;text-decoration:none;
  padding:6px 13px;border-radius:99px;border:1px solid rgba(255,255,255,.35)}
.fb-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.13);
  padding:5px 10px;border-radius:99px;font-size:10px;color:#fff}
.fb-dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7}
.fb-dot.off{background:#fca5a5}

/* TABS */
.tabs{background:var(--pearl);border-bottom:1px solid var(--beige);display:flex}
.tbtn{flex:1;font-size:13px;font-weight:600;border:none;background:none;
  color:var(--t2);cursor:pointer;border-bottom:2.5px solid transparent;
  padding:12px 8px;font-family:inherit;display:flex;align-items:center;
  justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
.tbtn.active{color:var(--vm);border-bottom-color:var(--vm)}
.tcnt{background:var(--vl);color:var(--vt);font-size:10px;
  padding:2px 7px;border-radius:99px;font-weight:700}

/* STORE SELECTOR — Opción B: dropdown */
.store-selector{
  background:#fff;border-bottom:1px solid var(--beige);
  padding:12px 16px;display:flex;align-items:center;gap:10px;
}
.store-selector label{font-size:12px;font-weight:700;color:var(--t2);
  white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.store-select-wrap{flex:1;position:relative}
.store-select-wrap select{
  width:100%;font-size:14px;font-weight:600;
  padding:10px 36px 10px 14px;
  border:1.5px solid var(--bdr2);border-radius:var(--r);
  background:var(--cream);color:var(--text);
  font-family:inherit;-webkit-appearance:none;appearance:none;
  cursor:pointer;transition:border-color .15s}
.store-select-wrap select:focus{
  outline:none;border-color:var(--vm);
  box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.store-select-wrap select.tienda-sel{
  border-color:var(--vm);background:var(--vl);color:var(--vt)}
.select-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--t2);font-size:12px}
.store-pend-chip{font-size:11px;font-weight:700;padding:4px 10px;
  border-radius:99px;background:var(--ol);color:var(--orange);white-space:nowrap;flex-shrink:0}

/* MAIN */
.main{padding:18px 16px 80px}

/* SECTION TITLE */
.stitle{font-size:15px;font-weight:700;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 10px;border-radius:99px;
  background:var(--vl);color:var(--vt);font-weight:700}
.divider{height:1px;background:var(--beige);margin:20px 0}

/* CARDS */
.card{background:#fff;border:1px solid var(--beige);border-radius:var(--rlg);
  padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(139,99,64,.06)}

/* FORM */
.fl{display:block;font-size:11px;font-weight:700;color:var(--t2);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;font-size:15px;padding:11px 12px;
  border:1px solid var(--bdr2);border-radius:var(--r);
  background:var(--cream);color:var(--text);font-family:inherit;
  -webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--vm);background:#fff;
  box-shadow:0 0 0 3px rgba(124,58,237,.1)}
textarea{resize:vertical;min-height:70px;line-height:1.5;font-size:14px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}

/* GALLETA BOX */
.gbox{background:var(--pearl);border:1px solid var(--beige);
  border-radius:var(--rlg);padding:14px;margin-bottom:12px}
.gbox-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.gbox-name{font-size:14px;font-weight:700}
.ppill{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:600;
  background:#fff;border:1px solid var(--bdr2);color:var(--brown)}
.g2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subtotal{font-size:17px;font-weight:700;color:var(--vm);text-align:center;
  padding:8px 0;margin-top:4px}

/* EXTRA BOX */
.xbox{background:var(--pearl);border:1.5px dashed var(--tan);
  border-radius:var(--rlg);padding:14px;margin-bottom:10px;position:relative}
.xbtn{position:absolute;top:8px;right:8px;background:none;border:none;
  color:var(--t3);cursor:pointer;font-size:22px;width:32px;height:32px;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent}
.xbtn:active{color:var(--red);background:var(--rl)}

/* BUTTONS */
.btn{font-size:14px;font-weight:700;padding:12px 18px;border-radius:var(--r);
  cursor:pointer;font-family:inherit;border:none;transition:all .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  -webkit-tap-highlight-color:transparent;width:100%;margin-bottom:8px}
.btn-p{background:linear-gradient(135deg,var(--violet),var(--plum));color:#fff;
  box-shadow:0 2px 8px rgba(107,33,168,.25)}
.btn-p:active{opacity:.85;transform:scale(.98)}
.btn-g{background:#fff;color:var(--t2);border:1px solid var(--bdr2)}
.btn-g:active{background:var(--pearl)}
.btn-add{background:transparent;color:var(--vm);
  border:1.5px dashed rgba(124,58,237,.5);font-size:13px;padding:10px}
.btn-add:active{background:var(--vl)}
.btn-d{background:transparent;color:var(--red);
  border:1px solid rgba(153,27,27,.2);font-size:12px;padding:8px 12px;
  width:auto;margin-bottom:0}
.btn-d:active{background:var(--rl)}
.btn-ok{background:var(--green);color:#fff}
.btn-ok:active{opacity:.88}
.btn-sm{font-size:12px;padding:9px 14px;width:auto;margin-bottom:0}

/* ENTREGA CARD */
.elc{background:#fff;border:1px solid var(--beige);border-radius:var(--rlg);
  overflow:hidden;margin-bottom:12px}
.elc-h{padding:12px 14px;
  background:linear-gradient(90deg,var(--vl),var(--pl));
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  border-bottom:1px solid var(--beige)}
.elc-store{font-size:14px;font-weight:700;color:var(--vt)}
.elc-date{font-size:11px;color:var(--t2);margin-top:2px}
.elc-b{padding:12px 14px}
.elc-row{display:flex;justify-content:space-between;align-items:flex-start;
  padding:7px 0;border-bottom:1px solid var(--beige);gap:8px}
.elc-row:last-child{border-bottom:none}
.elc-f{padding:10px 14px;background:var(--pearl);border-top:1px solid var(--beige);
  display:flex;align-items:center;justify-content:space-between;gap:6px}

/* CORTE CARD */
.cc{background:#fff;border:1px solid var(--beige);border-radius:var(--rlg);
  overflow:hidden;margin-bottom:14px}
.cc-h{padding:13px 14px;background:linear-gradient(90deg,var(--vl),var(--pl));
  border-bottom:1px solid var(--beige);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.cc-store{font-size:14px;font-weight:700;color:var(--vt)}
.cc-meta{font-size:11px;color:var(--t2);margin-top:2px}
.cc-b{padding:14px}
.cc-grow{padding:12px 0;border-bottom:1px solid var(--beige)}
.cc-grow:last-child{border-bottom:none}
.cc-gn{font-size:13px;font-weight:700;margin-bottom:3px}
.cc-gt{font-size:11px;color:var(--t2)}
.cc-ge{font-size:11px;color:var(--brown-lt);margin-top:2px}
.cc-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.cin-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--t3);font-weight:700;display:block;margin-bottom:5px}
.rem-val{font-size:20px;font-weight:700;color:var(--t2);text-align:center;padding:8px 0}
.rem-chip{font-size:11px;font-weight:700;text-align:center;margin-top:3px}
.rem-chip.ok{color:var(--green)}
.rem-chip.bad{color:var(--red)}
.cc-com{margin-top:14px;padding-top:14px;border-top:1px solid var(--beige)}
.cc-f{padding:12px 14px;background:var(--pearl);border-top:1px solid var(--beige)}
.cc-tot{font-size:14px;font-weight:700;color:var(--vt);margin-bottom:3px}
.cc-rem{font-size:11px;color:var(--t2);margin-bottom:12px}
.cc-btns{display:flex;gap:8px}

/* BADGES / PILLS */
.sbadge{display:inline-flex;font-size:11px;padding:3px 10px;
  border-radius:99px;font-weight:700;white-space:nowrap}
.sbadge.pendiente{background:var(--ol);color:var(--orange)}
.sbadge.cobrado{background:var(--gl);color:var(--green)}
.pill{display:inline-flex;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:700}
.pill.dec{background:var(--vl);color:var(--vt)}
.pill.acu{background:var(--pl);color:var(--pt)}
.pill.cus{background:var(--ol);color:var(--orange)}

/* EMPTY / HINT */
.empty{text-align:center;padding:40px 16px;color:var(--t2)}
.empty .ei{font-size:38px;margin-bottom:10px}
.empty h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.hint-box{background:var(--pearl);border:1.5px dashed var(--tan);
  border-radius:var(--rlg);padding:24px 16px;text-align:center;
  color:var(--t2);font-size:13px;margin-bottom:16px;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
  padding:11px 22px;border-radius:99px;font-size:13px;font-weight:600;
  z-index:999;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#065f46;color:#d1fae5}
.toast.err{background:#991b1b;color:#fee2e2}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(44,26,14,.45);
  z-index:400;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal-box{background:#fff;border-radius:var(--rlg) var(--rlg) 0 0;
  padding:24px;width:100%;max-width:480px;
  box-shadow:0 -4px 30px rgba(44,26,14,.15)}
.modal-box h3{font-size:15px;font-weight:700;margin-bottom:16px}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns .btn{margin-bottom:0}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="brand">
    <h1>🍪 Thypica</h1>
    <p>Entregas & Cortes</p>
  </div>
  <div class="hdr-r">
    <a href="dashboard.html" class="dash-link">📊 Dashboard</a>
    <div class="fb-chip">
      <div class="fb-dot off" id="fb-dot"></div>
      <span id="fb-status">Conectando…</span>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tbtn active" id="tab-ent" onclick="showTab('entregas')">
    📦 Entregas <span class="tcnt" id="cnt-ent">0</span>
  </button>
  <button class="tbtn" id="tab-cor" onclick="showTab('cortes')">
    ✂️ Cortes <span class="tcnt" id="cnt-cor">0</span>
  </button>
</div>

<!-- STORE SELECTOR (Opción B: dropdown) -->
<div class="store-selector">
  <label>Tienda:</label>
  <div class="store-select-wrap">
    <select id="store-select" onchange="onStoreChange(this.value)">
      <option value="">— Selecciona una tienda —</option>
    </select>
    <span class="select-arrow">▾</span>
  </div>
  <span class="store-pend-chip" id="pend-chip" style="display:none"></span>
  <button class="btn btn-g btn-sm" onclick="showModal('modal-store')" style="flex-shrink:0">＋</button>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL AGREGAR TIENDA -->
<div class="modal-bg" id="modal-store">
  <div class="modal-box">
    <h3>➕ Nueva tienda</h3>
    <div class="field">
      <label class="fl">Nombre</label>
      <input type="text" id="new-store-name" placeholder="Ej: Minisuper La Paz">
    </div>
    <div class="modal-btns">
      <button class="btn btn-g" onclick="closeModal('modal-store')">Cancelar</button>
      <button class="btn btn-p" onclick="addStore()">Agregar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG FIREBASE ────────────────────────────────────────
var FB_CONFIG = {
  apiKey:            "AIzaSyCzyxdWXWiSmtJ7wkDqKTQ5Kh9v6JRCdH4",
  authDomain:        "thypica-ventas.firebaseapp.com",
  databaseURL:       "https://thypica-ventas-default-rtdb.firebaseio.com",
  projectId:         "thypica-ventas",
  storageBucket:     "thypica-ventas.firebasestorage.app",
  messagingSenderId: "921842255918",
  appId:             "1:921842255918:web:af335bda753e00472bb7bf"
};

// ── CONSTANTES ─────────────────────────────────────────────
var PRECIO_DEC = 30;
var PRECIO_ACU = 50;

// ── ESTADO ─────────────────────────────────────────────────
var DB_CONNECTED  = false;
var fbDB          = null;
var entregas      = [];
var clientes      = [
  'Super FC','Carnes Torin','Super All','Alameda','Frutería el Riel',
  'Abarrotes Tulipanes','Dorcha','Campestre','El Kiosko','Carnes Pío','Concept Store Kameh'
];
var extraGalletas = [];
var extraIdx      = 0;
var currentTab    = 'entregas';
var selectedStore = null;

// ── HELPERS ────────────────────────────────────────────────
function fmt(n){
  return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(n||0);
}
function showToast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(type||'ok')+' show';
  setTimeout(function(){ el.className='toast'; },2800);
}
function updateCounts(){
  var pend=entregas.filter(function(e){ return e.estado!=='cobrado'; });
  document.getElementById('cnt-ent').textContent=entregas.length;
  document.getElementById('cnt-cor').textContent=pend.length;
}
function calcTotalEnt(e){
  return (e.galletas||[]).reduce(function(s,g){ return s+g.cantidad*g.precio; },0);
}
function calcTotalCorte(e){
  return (e.galletas||[]).reduce(function(s,g){ return s+(e.corte&&e.corte[g.tipo]||0)*g.precio; },0);
}
function q(id){ return document.getElementById(id); }
function val(id){ var el=q(id); return el?el.value:''; }
function showModal(id){ q(id).classList.add('show'); }
function closeModal(id){ q(id).classList.remove('show'); }

// ── STORE SELECT ───────────────────────────────────────────
function renderStoreSelect(){
  var sel=q('store-select');
  if(!sel) return;
  var cur=sel.value||'';
  sel.innerHTML='<option value="">— Selecciona una tienda —</option>'+
    clientes.map(function(c){
      return '<option value="'+c+'"'+(c===cur?' selected':'')+'>🏪 '+c+'</option>';
    }).join('');
  if(selectedStore) sel.value=selectedStore;
  updatePendChip();
}

function updatePendChip(){
  if(!selectedStore){ q('pend-chip').style.display='none'; return; }
  var pend=entregas.filter(function(e){ return e.tienda===selectedStore&&e.estado!=='cobrado'; });
  var chip=q('pend-chip');
  if(pend.length>0){
    chip.textContent=pend.length+' activa'+(pend.length>1?'s':'');
    chip.style.display='';
  } else {
    chip.style.display='none';
  }
}

function onStoreChange(val){
  selectedStore = val||null;
  extraGalletas=[]; extraIdx=0;
  // Mark select visually
  var sel=q('store-select');
  if(sel) sel.className='store-select-wrap select '+(val?'tienda-sel':'');
  updatePendChip();
  renderMain();
}

function addStore(){
  var name=val('new-store-name').trim();
  if(!name){ showToast('Escribe un nombre','err'); return; }
  if(clientes.indexOf(name)>=0){ showToast('Ya existe','err'); return; }
  clientes.push(name);
  if(DB_CONNECTED&&fbDB){ fbDB.ref('clientes').set(clientes).catch(function(){}); }
  closeModal('modal-store');
  renderStoreSelect();
  showToast('✓ "'+name+'" agregada');
}

// ── TABS ───────────────────────────────────────────────────
function showTab(tab){
  currentTab=tab;
  q('tab-ent').classList.toggle('active',tab==='entregas');
  q('tab-cor').classList.toggle('active',tab==='cortes');
  renderMain();
}

// ── MAIN ───────────────────────────────────────────────────
function renderMain(){
  renderStoreSelect();
  q('main').innerHTML=currentTab==='entregas'?renderEntregas():renderCortes();
  initCorteChips();
}

// ══ ENTREGAS ═══════════════════════════════════════════════
function renderEntregas(){
  var sorted=entregas.slice().sort(function(a,b){ return b.createdAt-a.createdAt; });

  var form=selectedStore ? (
    '<div class="stitle">Nueva entrega &nbsp;<span style="color:var(--vm);font-size:13px">— '+selectedStore+'</span></div>'+
    '<div class="card">'+

      '<div class="field" style="max-width:200px">'+
        '<label class="fl">Fecha de entrega</label>'+
        '<input type="date" id="fecha-ent" value="'+new Date().toISOString().split('T')[0]+'">'+
      '</div>'+

      // Galleta Decorada
      '<div class="gbox">'+
        '<div class="gbox-hdr"><span style="font-size:18px">🍪</span>'+
          '<span class="gbox-name">Galleta Decorada</span>'+
          '<span class="ppill">$'+PRECIO_DEC+' c/u</span></div>'+
        '<div class="g2col">'+
          '<div class="field"><label class="fl">Temática</label>'+
            '<input type="text" id="tema-dec" placeholder="Ej: Floral, Navidad…"></div>'+
          '<div class="field"><label class="fl">Cantidad</label>'+
            '<input type="number" id="qty-dec" min="0" value="0" inputmode="numeric" oninput="updSub(\'dec\','+PRECIO_DEC+')"></div>'+
        '</div>'+
        '<div class="subtotal" id="sub-dec">$0</div>'+
      '</div>'+

      // Galleta Acuarela
      '<div class="gbox">'+
        '<div class="gbox-hdr"><span style="font-size:18px">🎨</span>'+
          '<span class="gbox-name">Galleta Acuarela</span>'+
          '<span class="ppill" style="color:var(--plum)">$'+PRECIO_ACU+' c/u</span></div>'+
        '<div class="g2col">'+
          '<div class="field"><label class="fl">Temática</label>'+
            '<input type="text" id="tema-acu" placeholder="Ej: Acuarela primavera…"></div>'+
          '<div class="field"><label class="fl">Cantidad</label>'+
            '<input type="number" id="qty-acu" min="0" value="0" inputmode="numeric" oninput="updSub(\'acu\','+PRECIO_ACU+')"></div>'+
        '</div>'+
        '<div class="subtotal" id="sub-acu" style="color:var(--plum)">$0</div>'+
      '</div>'+

      '<div id="extras-container">'+
        extraGalletas.map(renderExtraCard).join('')+
      '</div>'+
      '<button class="btn btn-add" onclick="addExtra()" style="margin-bottom:14px">＋ Agregar otro tipo de galleta</button>'+
      '<button class="btn btn-p" onclick="guardarEntrega()">📦 Registrar entrega</button>'+
      '<button class="btn btn-g" onclick="cancelForm()">Cancelar</button>'+
    '</div>'
  ) : (
    '<div class="hint-box">'+
      '<div style="font-size:28px;margin-bottom:8px">☝️</div>'+
      'Selecciona una <strong>tienda</strong> en el menú de arriba para registrar una entrega.'+
    '</div>'
  );

  return form+
    '<div class="divider"></div>'+
    '<div class="stitle">Todas las entregas <span class="tag">'+entregas.length+'</span></div>'+
    (sorted.length===0
      ? '<div class="empty"><div class="ei">📦</div><h3>Sin entregas</h3><p>Selecciona una tienda para comenzar.</p></div>'
      : sorted.map(renderEntregaCard).join(''));
}

function renderExtraCard(g){

      '<div class="field"><label class="fl">Precio ($)</label>'+

      '<div class="field"><label class="fl">Temática</label>'+
        '<input type="text" id="xtem-'+g.uid+'" placeholder="Ej: Navidad…" value="'+g.tematica+'"></div>'+
      '<div class="field"><label class="fl">Cantidad</label>'+
        '<input type="number" id="xqty-'+g.uid+'" min="0" value="'+g.cantidad+'" inputmode="numeric"></div>'+

      '<span style="font-weight:700;font-size:13px;white-space:nowrap">'+g.cantidad+' · '+fmt(g.cantidad*g.precio)+'</span>'+
    '</div>';

  return '<div class="elc">'+
    '<div class="elc-h">'+
      '<div><div class="elc-store">🏪 '+e.tienda+'</div><div class="elc-date">'+e.fecha+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0">'+
        '<span class="sbadge '+e.estado+'">'+e.estado+'</span>'+

// ══ CORTES ═════════════════════════════════════════════════
function renderCortes(){
  var activas=entregas.filter(function(e){ return e.estado!=='cobrado'; })
    .sort(function(a,b){ return new Date(a.fecha)-new Date(b.fecha); });
  var cobradas=entregas.filter(function(e){ return e.estado==='cobrado'; })
    .sort(function(a,b){ return b.createdAt-a.createdAt; });
  var show=selectedStore?activas.filter(function(e){ return e.tienda===selectedStore; }):activas;

  var info=!selectedStore
    ?'<div style="font-size:12px;color:var(--t2);margin-bottom:12px;padding:10px 12px;background:var(--pearl);border-radius:var(--r);border:1px solid var(--beige)">Selecciona una tienda arriba para filtrar sus cortes.</div>'
    :'';

  var cards=show.length===0
    ?'<div class="empty"><div class="ei">✅</div><h3>Sin cortes pendientes</h3><p>'+(selectedStore?selectedStore+' no tiene entregas activas.':'No hay cortes pendientes.')+'</p></div>'
    :show.map(renderCorteCard).join('');

  var hist='';
  if(cobradas.length>0){
    var filtCob=selectedStore?cobradas.filter(function(e){return e.tienda===selectedStore;}):cobradas;
    if(filtCob.length>0){
      hist='<div class="divider"></div>'+
        '<div class="stitle" style="font-size:13px;color:var(--t2)">Historial cobrado ('+filtCob.length+')</div>'+
        filtCob.slice(0,5).map(function(e){
          return '<div class="elc" style="opacity:.65">'+
            '<div class="elc-h" style="background:var(--pearl)">'+
              '<div><div class="elc-store" style="color:var(--text)">🏪 '+e.tienda+'</div><div class="elc-date">'+e.fecha+'</div></div>'+
              '<div style="display:flex;gap:7px;align-items:center">'+
                '<span class="sbadge cobrado">✓ Cobrado</span>'+
                '<button class="btn btn-d" onclick="delEntrega(\''+e.id+'\')">🗑️</button>'+
              '</div>'+
            '</div>'+
            '<div class="elc-f"><strong style="font-size:13px;color:var(--vt)">'+fmt(calcTotalCorte(e))+'</strong>'+
              (e.comentario?'<span style="font-size:11px;color:var(--t2);font-style:italic">💬 '+e.comentario+'</span>':'')+
            '</div>'+
          '</div>';
        }).join('');
    }
  }

  return '<div class="stitle">Cortes pendientes '+(selectedStore?'<span style="color:var(--vm);font-size:13px">— '+selectedStore+'</span>':'')+
    ' <span class="tag">'+show.length+'</span></div>'+info+cards+hist;
}

function renderCorteCard(e){
  var totalEnt=calcTotalEnt(e);
  var grows=(e.galletas||[]).map(function(g){
    return '<div class="cc-grow">'+
      '<div class="cc-gn"><span class="pill '+(g.tipo==='acu'?'acu':g.tipo==='dec'?'dec':'cus')+'">'+g.nombre+'</span></div>'+
      '<div class="cc-gt">'+g.tematica+' · '+fmt(g.precio)+' c/u</div>'+
      '<div class="cc-ge">Entregadas: <strong>'+g.cantidad+'</strong> pzs</div>'+
      '<div class="cc-2">'+
        '<div>'+
          '<span class="cin-lbl">Vendidas</span>'+
          '<input type="number" inputmode="numeric" style="text-align:center"'+
            ' id="v-'+e.id+'-'+g.tipo+'" min="0" max="'+g.cantidad+'"'+
            ' value="'+(e.corte&&e.corte[g.tipo]||0)+'"'+
            ' oninput="calcRem(\''+e.id+'\',\''+g.tipo+'\','+g.cantidad+')">'+
          '<div class="rem-chip" id="rc-'+e.id+'-'+g.tipo+'">—</div>'+
        '</div>'+
        '<div>'+
          '<span class="cin-lbl">Remanente</span>'+
          '<div class="rem-val" id="rv-'+e.id+'-'+g.tipo+'">—</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  return '<div class="cc" id="cc-'+e.id+'">'+
    '<div class="cc-h">'+
      '<div><div class="cc-store">🏪 '+e.tienda+'</div><div class="cc-meta">'+e.fecha+' · '+fmt(totalEnt)+'</div></div>'+
      '<span class="sbadge pendiente">Pendiente</span>'+
    '</div>'+
    '<div class="cc-b">'+
      '<div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Galletas vendidas en el corte</div>'+
      grows+
      '<div class="cc-com">'+
        '<label class="fl">Comentarios</label>'+
        '<textarea id="com-'+e.id+'" placeholder="Observaciones, roturas, pedidos especiales…">'+(e.comentario||'')+'</textarea>'+
      '</div>'+
    '</div>'+
    '<div class="cc-f">'+
      '<div class="cc-tot" id="ct-'+e.id+'">Total a cobrar: —</div>'+
      '<div class="cc-rem" id="crt-'+e.id+'"></div>'+
      '<div class="cc-btns">'+
        '<button class="btn btn-g btn-sm" onclick="guardarCorte(\''+e.id+'\')">💾 Guardar</button>'+
        '<button class="btn btn-ok btn-sm" onclick="marcarCobrado(\''+e.id+'\')">✓ Cobrado</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ── ACTIONS ────────────────────────────────────────────────
function initCorteChips(){
  entregas.filter(function(e){ return e.estado!=='cobrado'; }).forEach(function(e){
    (e.galletas||[]).forEach(function(g){
      setTimeout(function(){ calcRem(e.id,g.tipo,g.cantidad); },80);
    });
  });
}

function updSub(tipo,precio){
  var qty=parseInt(val('qty-'+tipo)||0);
  var el=q('sub-'+tipo);
  if(el) el.textContent=fmt(qty*precio);
}

function calcRem(eid,tipo,max){
  var vend=parseInt(val('v-'+eid+'-'+tipo)||0);
  var rem=max-vend;
  var rc=q('rc-'+eid+'-'+tipo);
  var rv=q('rv-'+eid+'-'+tipo);
  if(rc){ rc.textContent=rem>=0?'rem: '+rem:'¡Excede!'; rc.className='rem-chip '+(rem>=0?'ok':'bad'); }
  if(rv) rv.textContent=rem>=0?rem:'!';
  var e=entregas.filter(function(x){ return x.id===eid; })[0];
  if(!e) return;
  var tot=0,remTot=0;
  (e.galletas||[]).forEach(function(g){
    var v=parseInt(val('v-'+eid+'-'+g.tipo)||0);
    tot+=v*g.precio; remTot+=Math.max(0,g.cantidad-v);
  });
  var ct=q('ct-'+eid),crt=q('crt-'+eid);
  if(ct) ct.textContent='Total a cobrar: '+fmt(tot);
  if(crt) crt.textContent='Remanente a recoger: '+remTot+' pzs';
}

function addExtra(){
  extraIdx++;
  var uid='x'+extraIdx;
  var g={uid:uid,nombre:'',precio:0,tematica:'',cantidad:0};
  extraGalletas.push(g);
  var c=q('extras-container');
  if(!c) return;
  var d=document.createElement('div');
  d.innerHTML=renderExtraCard(g);
  c.appendChild(d.firstElementChild);
}

function removeExtra(uid){
  extraGalletas=extraGalletas.filter(function(g){ return g.uid!==uid; });
  var el=q('xc-'+uid); if(el) el.remove();
}

function cancelForm(){ selectedStore=null; extraGalletas=[]; extraIdx=0; q('store-select').value=''; updatePendChip(); renderMain(); }

function guardarEntrega(){
  if(!selectedStore){ showToast('Selecciona una tienda','err'); return; }
  var fecha=val('fecha-ent');
  var list=[];
  var qd=parseInt(val('qty-dec')||0);
  if(qd>0) list.push({tipo:'dec',nombre:'Galleta Decorada',precio:PRECIO_DEC,tematica:val('tema-dec')||'Sin tema',cantidad:qd});
  var qa=parseInt(val('qty-acu')||0);
  if(qa>0) list.push({tipo:'acu',nombre:'Galleta Acuarela',precio:PRECIO_ACU,tematica:val('tema-acu')||'Sin tema',cantidad:qa});
  extraGalletas.forEach(function(g){
    var qty=parseInt(val('xqty-'+g.uid)||0);
    if(qty>0) list.push({tipo:'x'+g.uid,nombre:val('xnom-'+g.uid)||'Extra',
      precio:parseFloat(val('xpre-'+g.uid)||0),tematica:val('xtem-'+g.uid)||'Sin tema',cantidad:qty});
  });
  if(list.length===0){ showToast('Agrega galletas con cantidad > 0','err'); return; }
  var record={tienda:selectedStore,fecha:fecha,estado:'pendiente',
    galletas:list,corte:{},comentario:'',createdAt:Date.now()};
  if(DB_CONNECTED&&fbDB){
    fbDB.ref('entregas').push(record).catch(function(){});
  } else {
    entregas.push(Object.assign({id:'l'+Date.now()},record));
  }
  extraGalletas=[]; extraIdx=0;
  updateCounts(); renderMain();
  showToast('✓ Entrega registrada para '+selectedStore);
}

function guardarCorte(id){
  var e=entregas.filter(function(x){ return x.id===id; })[0]; if(!e) return;
  var corte={};
  (e.galletas||[]).forEach(function(g){ corte[g.tipo]=parseInt(val('v-'+id+'-'+g.tipo)||0); });
  var comentario=val('com-'+id)||'';
  var patch={corte:corte,comentario:comentario};
  var idx=entregas.findIndex(function(x){ return x.id===id; });
  if(idx>=0) entregas[idx]=Object.assign({},entregas[idx],patch);
  if(DB_CONNECTED&&fbDB){ fbDB.ref('entregas/'+id).update(patch).catch(function(){}); }
  showToast('✓ Corte guardado');
}

function marcarCobrado(id){
  guardarCorte(id);
  var patch={estado:'cobrado'};
  var idx=entregas.findIndex(function(x){ return x.id===id; });
  if(idx>=0) entregas[idx]=Object.assign({},entregas[idx],patch);
  if(DB_CONNECTED&&fbDB){ fbDB.ref('entregas/'+id).update(patch).catch(function(){}); }
  updateCounts(); renderMain();
  showToast('✓ Marcado como cobrado');
}

function delEntrega(id){
  if(!confirm('¿Eliminar esta entrega?')) return;
  entregas=entregas.filter(function(e){ return e.id!==id; });
  if(DB_CONNECTED&&fbDB){ fbDB.ref('entregas/'+id).remove().catch(function(){}); }
  updateCounts(); renderMain();
  showToast('Entrega eliminada','err');
}

// ── FIREBASE (compat SDK) ──────────────────────────────────
var fbApp=document.createElement('script');
fbApp.src='https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js';
fbApp.onload=function(){
  var fbDb=document.createElement('script');
  fbDb.src='https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js';
  fbDb.onload=function(){
    try{
      firebase.initializeApp(FB_CONFIG);
      fbDB=firebase.database();
      fbDB.ref('.info/connected').on('value',function(s){
        DB_CONNECTED=s.val()===true;
        q('fb-dot').className='fb-dot'+(DB_CONNECTED?'':' off');
        q('fb-status').textContent=DB_CONNECTED?'En vivo':'Sin Firebase';
      });
      fbDB.ref('entregas').on('value',function(s){
        entregas=[];
        s.forEach(function(c){ entregas.push(Object.assign({id:c.key},c.val())); });
        updateCounts(); renderMain();
      });
      fbDB.ref('clientes').on('value',function(s){
        if(s.exists()){ clientes=s.val(); renderStoreSelect(); }
      });
    }catch(e){
      console.warn('Firebase:',e.message);
      q('fb-dot').className='fb-dot off';
      q('fb-status').textContent='Sin Firebase';
    }
  };
  document.head.appendChild(fbDb);
};
document.head.appendChild(fbApp);

// ── ARRANQUE ───────────────────────────────────────────────
entregas=demoData();
updateCounts();
renderStoreSelect();
renderMain();
</script>
