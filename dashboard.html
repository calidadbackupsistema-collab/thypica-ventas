<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thypica — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf7f2;--bg2:#ffffff;--bg3:#f5f0e8;--bg4:#ede4d4;
  --text:#2c1a0e;--text2:#7a5c3a;--text3:#b89a78;
  --border:rgba(139,99,64,0.13);--border2:rgba(139,99,64,0.25);
  --purple:#6d28d9;--purple-light:#ede9fe;--purple-text:#4c1d95;
  --pink:#a21caf;--pink-light:#f5d0fe;--pink-text:#701a75;
  --green:#047857;--green-light:#d1fae5;
  --orange:#92400e;--orange-light:#fef3c7;
  --red:#991b1b;--red-light:#fee2e2;
  --blue:#1d4ed8;--blue-light:#dbeafe;
  --brown:#8b6340;--tan:#d4c4a8;--beige:#ede4d4;
  --r:10px;--r-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#4c1d95 0%,#6d28d9 45%,#a21caf 100%);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(109,40,217,0.35)}
.brand h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.brand p{font-size:11px;color:rgba(255,255,255,0.7);margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px}
.go-form{font-size:12px;color:rgba(255,255,255,0.85);text-decoration:none;padding:7px 16px;border-radius:99px;border:1px solid rgba(255,255,255,0.3);transition:all .15s;font-weight:500}
.go-form:hover{background:rgba(255,255,255,0.2);color:#fff}
.fb-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);padding:5px 12px;border-radius:99px;font-size:11px;color:#fff}
.fb-dot{width:6px;height:6px;border-radius:50%;background:#34d399}
.fb-dot.off{background:#f87171}

/* PERIOD SELECTOR */
.period-bar{background:var(--bg3);border-bottom:1px solid var(--bg4);padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.period-bar label{font-size:12px;color:var(--text2);font-weight:600}
.period-btn{font-size:12px;padding:6px 16px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.period-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.period-btn:hover:not(.active){background:var(--bg3)}
.costos-mini{margin-left:auto;display:flex;align-items:center;gap:12px}
.costos-field{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.costos-field input{font-size:12px;padding:5px 9px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);width:100px;font-family:inherit}
.costos-field input:focus{outline:none;border-color:var(--purple)}
.btn-save-costos{font-size:12px;padding:6px 13px;border-radius:var(--r);border:none;background:var(--purple);color:#fff;cursor:pointer;font-family:inherit;font-weight:600}

/* LAYOUT */
.page{max-width:1280px;margin:0 auto;padding:24px 28px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.grid4{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.page{padding:14px}}
.section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;color:var(--text)}
.tag{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--purple-light);color:var(--purple-text);font-weight:700}

/* METRIC CARDS */
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.metric.purple::before{background:linear-gradient(90deg,var(--purple),#a855f7)}
.metric.pink::before{background:linear-gradient(90deg,var(--pink),#f472b6)}
.metric.green::before{background:linear-gradient(90deg,var(--green),#34d399)}
.metric.orange::before{background:linear-gradient(90deg,var(--orange),#fbbf24)}
.metric.red::before{background:linear-gradient(90deg,var(--red),#f87171)}
.metric.blue::before{background:linear-gradient(90deg,var(--blue),#60a5fa)}
.metric-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.metric-value{font-size:26px;font-weight:700;line-height:1;letter-spacing:-0.5px}
.metric.purple .metric-value{color:var(--purple)}
.metric.pink   .metric-value{color:var(--pink)}
.metric.green  .metric-value{color:var(--green)}
.metric.orange .metric-value{color:var(--orange)}
.metric.red    .metric-value{color:var(--red)}
.metric.blue   .metric-value{color:var(--blue)}
.metric-sub{font-size:12px;color:var(--text2);margin-top:6px}

/* CHART CARDS */
.chart-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:20px}
.chart-card h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px}
.chart-card.span2{grid-column:span 2}
@media(max-width:900px){.chart-card.span2{grid-column:span 1}}

/* TABLE */
.table-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:16px;overflow-x:auto}
.table-card h3{font-size:14px;font-weight:600;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
th{text-align:left;padding:8px 12px;font-size:11px;font-weight:700;color:var(--text2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:0.5px;background:var(--bg3)}
td{padding:11px 12px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.pill{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600}
.pill.suc{background:var(--purple-light);color:var(--purple-text)}
.pill.dir{background:var(--pink-light);color:var(--pink-text)}
.pill.ok{background:var(--green-light);color:var(--green)}
.pill.pend{background:var(--orange-light);color:var(--orange)}

/* TEMATICA RANKING */
.tema-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.tema-row:last-child{border-bottom:none}
.tema-rank{width:24px;height:24px;border-radius:50%;background:var(--purple-light);color:var(--purple-text);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tema-name{flex:1;font-size:13px;font-weight:500}
.tema-bar-wrap{width:120px;height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.tema-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--purple),var(--pink))}
.tema-qty{font-size:12px;color:var(--text2);min-width:50px;text-align:right;font-weight:600}

/* COSTOS SECTION */
.costos-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.costos-block{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:18px}
.costos-block h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px}
.costos-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.costos-row:last-child{border-bottom:none}
.costos-row.total{border-top:1.5px solid var(--border2);margin-top:6px;padding-top:12px}
.costos-row .cn{color:var(--text2)}
.costos-row .ca{font-weight:700}
.margen-bar-wrap{background:var(--bg3);border-radius:99px;height:8px;margin:10px 0;overflow:hidden}
.margen-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .6s ease}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 12px;border-radius:99px;font-weight:600}
.chip.up{background:var(--green-light);color:var(--green)}
.chip.down{background:var(--red-light);color:var(--red)}
.chip.neutral{background:var(--bg3);color:var(--text2)}

/* LOADING */
#loading{display:flex;align-items:center;justify-content:center;min-height:400px;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <h1>🍪 Thypica</h1>
    <p>Dashboard de Ventas — Galletas de Mantequilla</p>
  </div>
  <div class="header-right">
    <a href="entregas.html" class="go-form">📝 Ir a Entregas & Cortes</a>
    <div class="fb-chip"><div class="fb-dot off" id="fb-dot"></div><span id="fb-status">Conectando…</span></div>
  </div>
</div>

<!-- PERIOD + COSTOS BAR -->
<div class="period-bar">
  <label>Ver período:</label>
  <button class="period-btn active" onclick="setPeriod('semana')" id="pb-semana">Esta semana</button>
  <button class="period-btn" onclick="setPeriod('mes')" id="pb-mes">Este mes</button>
  <button class="period-btn" onclick="setPeriod('anio')" id="pb-anio">Este año</button>
  <div class="costos-mini">
    <div class="costos-field">
      <span>🧂 Materia:</span>
      <input type="number" id="inp-materia" value="8500" onchange="recalc()">
    </div>
    <div class="costos-field">
      <span>👩 Salarios:</span>
      <input type="number" id="inp-salarios" value="12000" onchange="recalc()">
    </div>
    <button class="btn-save-costos" onclick="saveCostos()">Guardar</button>
  </div>
</div>

<div class="page" id="page">
  <div id="loading"><div class="spinner"></div><span style="font-size:14px;color:var(--text2)">Cargando datos…</span></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ═══════════════════════════════════════════════════════════
//  🔥 CONFIGURACIÓN FIREBASE — mismos valores que entregas.html
// ═══════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyCzyxdWXWiSmtJ7wkDqKTQ5Kh9v6JRCdH4",
  authDomain:        "thypica-ventas.firebaseapp.com",
  databaseURL:       "https://thypica-ventas-default-rtdb.firebaseio.com",
  projectId:         "thypica-ventas",
  storageBucket:     "thypica-ventas.firebasestorage.app",
  messagingSenderId: "921842255918",
  appId:             "1:921842255918:web:af335bda753e00472bb7bf"
};
// ═══════════════════════════════════════════════════════════

let DB_CONNECTED=false, _db, _ref, _set;
let entregas=[], costos={materia:8500,salarios:12000};
let period='semana';
let charts={};

try {
  const app=initializeApp(firebaseConfig);
  _db=getDatabase(app); _ref=ref; _set=set;
  onValue(ref(_db,'.info/connected'),s=>{
    DB_CONNECTED=s.val()===true;
    document.getElementById('fb-dot').className='fb-dot'+(DB_CONNECTED?'':' off');
    document.getElementById('fb-status').textContent=DB_CONNECTED?'Firebase en vivo':'Sin Firebase';
  });
  onValue(ref(_db,'entregas'),s=>{
    entregas=[];
    s.forEach(c=>entregas.push({id:c.key,...c.val()}));
    render();
  });
  onValue(ref(_db,'costos'),s=>{
    if(s.exists()){
      costos=s.val();
      document.getElementById('inp-materia').value=costos.materia;
      document.getElementById('inp-salarios').value=costos.salarios;
      render();
    }
  });
} catch(e) {
  console.warn('Firebase no configurado');
  document.getElementById('fb-dot').className='fb-dot off';
  document.getElementById('fb-status').textContent='Modo demo';
  entregas=demoData();
  setTimeout(render,400);
}

// ── DEMO ─────────────────────────────────────────────────────
function demoData(){
  const rows=[];
  const tiendas=['Super FC','Carnes Torin','Super All','Alameda','Frutería el Riel',
    'Abarrotes Tulipanes','Dorcha','Campestre','El Kiosko','Carnes Pío','Concept Store Kameh'];
  const temas=['Floral','Pascua','Primavera','Cumpleaños','San Valentín','Navidad','Boda'];
  const now=Date.now();
  for(let w=0;w<12;w++){
    tiendas.forEach(t=>{
      const en=Math.floor(Math.random()*18)+4;
      const ea=Math.floor(Math.random()*9)+2;
      const vn=Math.floor(en*(0.55+Math.random()*0.42));
      const va=Math.floor(ea*(0.55+Math.random()*0.42));
      const tema=temas[w%temas.length];
      rows.push({
        id:`d_${t}_${w}`, tienda:t,
        fecha:new Date(now-(11-w)*7*86400000).toISOString().split('T')[0],
        estado:w<10?'cobrado':'pendiente',
        galletas:[
          {tipo:'decorada',nombre:'Galleta Decorada',precio:30,tematica:tema,cantidad:en},
          {tipo:'acuarela',nombre:'Galleta Acuarela', precio:50,tematica:tema,cantidad:ea}
        ],
        corte:{decorada:vn,acuarela:va},
        comentario:'',
        createdAt:now-(11-w)*7*86400000
      });
    });
  }
  return rows;
}

// ── HELPERS ──────────────────────────────────────────────────
const fmt=n=>new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(n||0);

function dateRange(){
  const now=new Date();
  if(period==='semana'){
    const d=new Date(now); d.setDate(d.getDate()-d.getDay()+1);
    const e=new Date(d); e.setDate(d.getDate()+6);
    return [d,e];
  }
  if(period==='mes'){
    return [new Date(now.getFullYear(),now.getMonth(),1),new Date(now.getFullYear(),now.getMonth()+1,0)];
  }
  return [new Date(now.getFullYear(),0,1),new Date(now.getFullYear(),11,31)];
}

function filterPeriod(arr){
  const [s,e]=dateRange();
  return arr.filter(x=>{
    if(!x.fecha) return false;
    const d=new Date(x.fecha+'T00:00:00');
    return d>=s && d<=e;
  });
}

function calcIngreso(arr){
  return arr.reduce((sum,e)=>{
    return sum+(e.galletas||[]).reduce((s,g)=>{
      const v=e.corte?.[g.tipo]||0;
      return s+v*g.precio;
    },0);
  },0);
}
function calcIngresoByTipo(arr,tipo){
  return arr.filter(e=>e.estado==='cobrado').reduce((sum,e)=>{
    // determine if "sucursal" or "directo" — using tienda list heuristic or field
    // For demo we split by index
    return sum+(e.galletas||[]).reduce((s,g)=>s+(e.corte?.[g.tipo]||0)*g.precio,0);
  },0);
}

function calcEntregaIngreso(e){
  return (e.galletas||[]).reduce((s,g)=>(e.corte?.[g.tipo]||0)*g.precio+s,0);
}

function getTematicas(arr){
  const counts={};
  arr.forEach(e=>{
    (e.galletas||[]).forEach(g=>{
      const v=e.corte?.[g.tipo]||0;
      if(v>0){
        const t=g.tematica||'Sin tema';
        counts[t]=(counts[t]||0)+v;
      }
    });
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
}

function getWeeklyTrend(){
  const weeks=[];
  for(let i=11;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i*7);
    const ws=d.toISOString().split('T')[0];
    const we=new Date(d); we.setDate(d.getDate()+6);
    const weStr=we.toISOString().split('T')[0];
    const lbl='S'+(Math.ceil((d.getDate()-d.getDay()+9)/7));
    const matching=entregas.filter(e=>{
      if(!e.fecha) return false;
      return e.fecha>=ws && e.fecha<=weStr;
    });
    weeks.push({label:lbl, ingreso:calcIngreso(matching)});
  }
  return weeks;
}

function getTopTiendas(arr){
  const map={};
  arr.forEach(e=>{
    const ing=calcEntregaIngreso(e);
    if(!map[e.tienda]) map[e.tienda]={tienda:e.tienda,ingreso:0,entregas:0,pzs:0};
    map[e.tienda].ingreso+=ing;
    map[e.tienda].entregas++;
    map[e.tienda].pzs+=(e.galletas||[]).reduce((s,g)=>s+(e.corte?.[g.tipo]||0),0);
  });
  return Object.values(map).sort((a,b)=>b.ingreso-a.ingreso);
}

// ── PERIOD ──────────────────────────────────────────────────
window.setPeriod=(p)=>{
  period=p;
  ['semana','mes','anio'].forEach(x=>document.getElementById('pb-'+x).classList.toggle('active',x===p));
  render();
};
window.recalc=()=>{
  costos.materia=parseFloat(document.getElementById('inp-materia')?.value||0);
  costos.salarios=parseFloat(document.getElementById('inp-salarios')?.value||0);
  render();
};
window.saveCostos=async()=>{
  costos.materia=parseFloat(document.getElementById('inp-materia')?.value||0);
  costos.salarios=parseFloat(document.getElementById('inp-salarios')?.value||0);
  if(DB_CONNECTED&&_db){ try{ await _set(_ref(_db,'costos'),costos); }catch(e){} }
};

// ── RENDER ───────────────────────────────────────────────────
function render(){
  const filtered=filterPeriod(entregas).filter(e=>e.estado==='cobrado');
  const pendientes=filterPeriod(entregas).filter(e=>e.estado!=='cobrado');
  const totalIng=calcIngreso(filtered);
  const margen=totalIng-costos.materia-costos.salarios;
  const pct=totalIng>0?Math.round((margen/totalIng)*100):0;
  const temas=getTematicas(filtered);
  const [bestTema,bestCnt]=temas[0]||['—',0];
  const topTiendas=getTopTiendas(filtered);

  const totalPzNorm=filtered.reduce((s,e)=>s+(e.corte?.decorada||0),0);
  const totalPzAcu=filtered.reduce((s,e)=>s+(e.corte?.acuarela||0),0);

  const periodLabel={semana:'Esta semana',mes:'Este mes',anio:'Este año'}[period];

  document.getElementById('page').innerHTML=`
<!-- METRICS -->
<div class="grid4">
  <div class="metric purple">
    <div class="metric-label">Venta Total</div>
    <div class="metric-value">${fmt(totalIng)}</div>
    <div class="metric-sub">${periodLabel}</div>
  </div>
  <div class="metric pink">
    <div class="metric-label">Pendiente de cobro</div>
    <div class="metric-value">${fmt(calcIngreso(pendientes))}</div>
    <div class="metric-sub">${pendientes.length} entregas activas</div>
  </div>
  <div class="metric ${margen>=0?'green':'red'}">
    <div class="metric-label">Utilidad neta</div>
    <div class="metric-value">${fmt(margen)}</div>
    <div class="metric-sub">Margen ${pct}%</div>
  </div>
  <div class="metric blue">
    <div class="metric-label">🏆 Temática top</div>
    <div class="metric-value" style="font-size:16px;margin-top:4px">${bestTema}</div>
    <div class="metric-sub">${bestCnt} pzs vendidas</div>
  </div>
</div>

<!-- SUBTOTALS -->
<div class="grid4" style="margin-bottom:20px">
  <div class="metric purple">
    <div class="metric-label">🍪 Galleta Decorada</div>
    <div class="metric-value" style="font-size:20px">${totalPzNorm}</div>
    <div class="metric-sub">${fmt(totalPzNorm*30)} · $30 c/u</div>
  </div>
  <div class="metric pink">
    <div class="metric-label">🎨 Galleta Acuarela</div>
    <div class="metric-value" style="font-size:20px">${totalPzAcu}</div>
    <div class="metric-sub">${fmt(totalPzAcu*50)} · $50 c/u</div>
  </div>
  <div class="metric orange">
    <div class="metric-label">Total piezas vendidas</div>
    <div class="metric-value" style="font-size:20px">${totalPzNorm+totalPzAcu}</div>
    <div class="metric-sub">${periodLabel}</div>
  </div>
  <div class="metric ${margen>=0?'green':'red'}">
    <div class="metric-label">Costo por pieza</div>
    <div class="metric-value" style="font-size:20px">${fmt((costos.materia+costos.salarios)/Math.max(1,totalPzNorm+totalPzAcu))}</div>
    <div class="metric-sub">Materia + salario</div>
  </div>
</div>

<!-- CHARTS ROW 1 -->
<div class="grid2" style="margin-bottom:16px">
  <div class="chart-card span2">
    <h3>Tendencia semanal de ingresos — últimas 12 semanas</h3>
    <canvas id="chart-trend" height="110"></canvas>
  </div>
</div>
<div class="grid2" style="margin-bottom:16px">
  <div class="chart-card">
    <h3>Tipo de galleta vendida — ${periodLabel}</h3>
    <canvas id="chart-tipo" height="180"></canvas>
  </div>
  <div class="chart-card">
    <h3>Ventas por tienda — ${periodLabel}</h3>
    <canvas id="chart-tiendas" height="180"></canvas>
  </div>
</div>

<!-- COSTOS & UTILIDAD -->
<div class="section-title">Costos & Utilidad</div>
<div class="costos-grid">
  <div class="costos-block">
    <h3>Estado financiero — ${periodLabel}</h3>
    <div class="costos-row"><span class="cn">Ingresos cobrados</span><span class="ca" style="color:var(--green)">${fmt(totalIng)}</span></div>
    <div class="costos-row"><span class="cn">— Materia prima</span><span class="ca" style="color:var(--red)">${fmt(costos.materia)}</span></div>
    <div class="costos-row"><span class="cn">— Salarios</span><span class="ca" style="color:var(--red)">${fmt(costos.salarios)}</span></div>
    <div class="costos-row total"><span class="cn" style="font-weight:700;font-size:15px">Utilidad neta</span><span class="ca" style="color:${margen>=0?'var(--green)':'var(--red)'};font-size:20px">${fmt(margen)}</span></div>
    <div style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--text2)">Margen</span><strong>${pct}%</strong></div>
      <div class="margen-bar-wrap"><div class="margen-bar" style="width:${Math.max(0,Math.min(100,pct))}%"></div></div>
      <div style="margin-top:8px"><span class="chip ${margen>=0?'up':'down'}">${margen>=0?'✓ Rentable':'⚠ Pérdida'}</span></div>
    </div>
  </div>
  <div class="costos-block">
    <h3>Top temáticas del período</h3>
    ${temas.slice(0,7).map(([t,n],i)=>{
      const max=temas[0]?.[1]||1;
      const pct=Math.round((n/max)*100);
      const medals=['🥇','🥈','🥉'];
      return `
      <div class="tema-row">
        <div class="tema-rank">${medals[i]||i+1}</div>
        <div class="tema-name">${t}</div>
        <div class="tema-bar-wrap"><div class="tema-bar" style="width:${pct}%"></div></div>
        <div class="tema-qty">${n} pzs</div>
      </div>`;
    }).join('')}
    ${temas.length===0?`<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px">Sin datos para el período</div>`:''}
  </div>
</div>

<!-- TOP TIENDAS TABLE -->
<div class="section-title">Rendimiento por tienda — ${periodLabel}</div>
<div class="table-card">
  <table>
    <thead><tr><th>#</th><th>Tienda</th><th>Piezas vendidas</th><th>Ingresos</th><th>Entregas</th><th>Participación</th></tr></thead>
    <tbody>
      ${topTiendas.length===0
        ?'<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text2)">Sin datos para el período seleccionado.</td></tr>'
        :topTiendas.map((t,i)=>{
          const pctT=totalIng>0?Math.round((t.ingreso/totalIng)*100):0;
          return `
          <tr>
            <td style="color:var(--text2);font-weight:700">${i+1}</td>
            <td style="font-weight:600">🏪 ${t.tienda}</td>
            <td>${t.pzs} pzs</td>
            <td style="font-weight:700;color:var(--purple)">${fmt(t.ingreso)}</td>
            <td>${t.entregas}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div style="flex:1;background:var(--bg3);border-radius:99px;height:6px;overflow:hidden;min-width:60px">
                  <div style="width:${pctT}%;height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:99px"></div>
                </div>
                <span style="font-size:12px;font-weight:600;color:var(--text2);min-width:32px">${pctT}%</span>
              </div>
            </td>
          </tr>`;
        }).join('')
      }
    </tbody>
  </table>
</div>`;

  initCharts(filtered, temas, topTiendas);
}

// ── CHARTS ───────────────────────────────────────────────────
function initCharts(filtered, temas, topTiendas){
  const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const tc=dark?'rgba(255,255,255,0.45)':'rgba(0,0,0,0.4)';
  const gc=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)';
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};

  // Trend
  const tE=document.getElementById('chart-trend');
  if(tE){
    const trend=getWeeklyTrend();
    charts.trend=new Chart(tE,{
      type:'bar',
      data:{
        labels:trend.map(t=>t.label),
        datasets:[
          {type:'line',label:'Ingresos',data:trend.map(t=>t.ingreso),borderColor:'#6d28d9',backgroundColor:'rgba(109,40,217,0.08)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#6d28d9',yAxisID:'y'},
          {type:'bar',label:'',data:trend.map(t=>t.ingreso),backgroundColor:'rgba(109,40,217,0.12)',borderRadius:4,yAxisID:'y'}
        ]
      },
      options:{responsive:true,plugins:{legend:{display:false}},
        scales:{y:{ticks:{color:tc,font:{size:10},callback:v=>'$'+(v/1000).toFixed(0)+'k'},grid:{color:gc}},x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}}}
    });
  }

  // Tipo doughnut
  const tpE=document.getElementById('chart-tipo');
  if(tpE){
    const nN=filtered.reduce((s,e)=>s+(e.corte?.decorada||0),0);
    const nA=filtered.reduce((s,e)=>s+(e.corte?.acuarela||0),0);
    charts.tipo=new Chart(tpE,{
      type:'doughnut',
      data:{labels:['🍪 Decorada ($30)','🎨 Acuarela ($50)'],
        datasets:[{data:[nN,nA],backgroundColor:['#6d28d9','#db2777'],borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,cutout:'60%',plugins:{legend:{display:true,position:'bottom',labels:{color:tc,font:{size:11},boxWidth:12,padding:12}}}}
    });
  }

  // Tiendas bar
  const tiE=document.getElementById('chart-tiendas');
  if(tiE){
    const top8=topTiendas.slice(0,8);
    charts.tiendas=new Chart(tiE,{
      type:'bar',
      data:{
        labels:top8.map(t=>t.tienda.split(' ')[0]),
        datasets:[{data:top8.map(t=>t.ingreso),backgroundColor:'rgba(109,40,217,0.7)',borderRadius:6,hoverBackgroundColor:'#6d28d9'}]
      },
      options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:tc,font:{size:10},callback:v=>'$'+(v/1000).toFixed(1)+'k'},grid:{color:gc}},
                y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}}}
    });
  }
}

setTimeout(()=>{if(!DB_CONNECTED&&entregas.length===0){entregas=demoData();}render();},600);
</script>
</body>
</html>
